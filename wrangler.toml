name = "so-upload-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
# UPLOAD_JWT is set via `wrangler secret put UPLOAD_JWT`
# UPLOAD_SECRET is set via `wrangler secret put UPLOAD_SECRET`

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "so-prod-user-content"
preview_bucket_name = "so-dev-user-content"

[observability]
enabled = true

# Rate limiting (optional, Cloudflare paid plan)
# [[unsafe.bindings]]
# name = "RATE_LIMITER"
# type = "ratelimit"
# namespace_id = "1001"
# simple = { limit = 100, period = 60 }
